<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <!-- Deepest Shadow -->
  <rect x="56" y="56" width="168" height="168" fill="#1D3557" />
  
  <!-- Middle Accent -->
  <rect x="40" y="40" width="168" height="168" fill="#E63946" stroke="#1A1A1A" stroke-width="6" stroke-linejoin="miter" />

  <!-- Main Front Paper -->
  <rect x="24" y="24" width="168" height="168" fill="#F2EFE9" stroke="#1A1A1A" stroke-width="6" stroke-linejoin="miter" />

  <!-- Decorative brutalist crosses (rivets) in corners -->
  <path d="M 36 36 L 44 44 M 44 36 L 36 44" stroke="#1A1A1A" stroke-width="3" />
  <path d="M 172 36 L 180 44 M 180 36 L 172 44" stroke="#1A1A1A" stroke-width="3" />
  <path d="M 36 172 L 44 180 M 44 172 L 36 180" stroke="#1A1A1A" stroke-width="3" />
  <path d="M 172 172 L 180 180 M 180 172 L 172 180" stroke="#1A1A1A" stroke-width="3" />

  <!-- The "CM" Lettermark -->
  <!-- Letter C -->
  <path d="M 96 64 L 52 64 L 52 152 L 96 152 L 96 132 L 72 132 L 72 84 L 96 84 Z" fill="#1A1A1A" />
  
  <!-- Letter M -->
  <path d="M 108 152 L 108 64 L 130 64 L 136 98 L 142 64 L 164 64 L 164 152 L 146 152 L 146 92 L 136 126 L 126 92 L 126 152 Z" fill="#1A1A1A" />

  <!-- Abstract Node Connection Line (Bridge between C & M) -->
  <path d="M 96 108 L 108 108" stroke="#E63946" stroke-width="6" stroke-linecap="square" />
</svg>
